# SonarCloud Configuration
sonar.organization=jpourdanis
sonar.projectKey=jpourdanis_test-automation-best-practices
sonar.host.url=https://sonarcloud.io

# Path to the source directories
sonar.sources=src,server
# Path to the test directories
sonar.tests=src,server,e2e

# Source and Test inclusions/exclusions
# Exclude specific files and build artifacts from analysis
sonar.exclusions=node_modules/**,build/**,dist/**,allure-results/**,coverage/**,reports/**,.nyc_output/**,src/setupProxy.js,server/jest.config.js,src/index.tsx,src/setupTests.ts,src/logo.svg,public/**/*.ico,public/**/*.png,demo.webp,.env.local,.env.example,server/.env.example,.DS_Store,.github/**,.husky/**,.vscode/**,.qodo/**,.vercel/**,.cspell.json,.mega-linter.yml,.prettierrc,.trivyignore,config-overrides.js,stryker.conf.json,server/stryker.config.json,vercel.json,tsconfig.json,playwright-report/**,test-results/**,src/react-app-env.d.ts

# Inclusions for sonar.tests
sonar.test.inclusions=src/**/*.test.tsx,src/**/*.test.ts,server/**/*.test.js,server/**/*.int.test.js,e2e/**/*.spec.ts,e2e/**/*.spec.js,e2e/**/*.feature
# Exclude test files that contain no actual tests (e.g., step definitions)
sonar.test.exclusions=e2e/tests/bdd.spec.ts

# Coverage configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Reporting and Encoding
sonar.sourceEncoding=UTF-8

# Specific file extensions
sonar.lang.patterns.ts=**/*.ts,**/*.tsx
sonar.lang.patterns.js=**/*.js,**/*.jsx
