name: Mobile E2E (iOS)

on:
  pull_request:
    branches: [main, react_native]
    paths: ["mobile/**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ==========================================
  # iOS E2E TESTS (Appium + iOS Simulator)
  # ==========================================
  ios-e2e:
    name: iOS E2E Tests (Appium + Simulator)
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      # Fetches the artifact URL of the most recent successful iOS simulator
      # build from EAS and downloads it. The .app is extracted from the tarball
      # and its absolute path is written to $GITHUB_ENV for later steps.
      - name: Download latest EAS iOS simulator build
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          mkdir -p e2e/artifacts

          BUILD_URL=$(eas build:list \
            --platform ios \
            --profile simulator \
            --status finished \
            --limit 1 \
            --json \
            --non-interactive \
            | jq -r '.[0].artifacts.buildUrl')

          if [ -z "$BUILD_URL" ] || [ "$BUILD_URL" = "null" ]; then
            echo "::error::No finished simulator build found on EAS. Trigger one with: npm run build:ios"
            exit 1
          fi

          echo "Downloading artifact: $BUILD_URL"
          curl -L "$BUILD_URL" -o e2e/artifacts/ios-simulator.tar.gz
          cd e2e/artifacts && tar -xzf ios-simulator.tar.gz

          APP=$(ls -d ./*.app 2>/dev/null | head -1 | sed 's|^\./||')
          if [ -z "$APP" ]; then
            echo "::error::No .app found after extracting the EAS artifact."
            exit 1
          fi

          echo "APP_PATH=${{ github.workspace }}/mobile/e2e/artifacts/$APP" >> $GITHUB_ENV
          echo "Found app: $APP"

      # Point xcode-select at the full Xcode app so simctl and
      # the XCUITest driver have access to the simulator runtime.
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: List available iPhone simulators
        run: xcrun simctl list devices available | grep -E "iPhone [0-9]"

      # Boot the simulator early so WDA compilation doesn't eat into the
      # session creation timeout window. bootstatus -b blocks until ready.
      - name: Boot iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep -E "iPhone 16 \(" | head -1 | grep -Eo '[A-F0-9]{8}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{4}-[A-F0-9]{12}')
          echo "Booting simulator: $UDID"
          xcrun simctl boot "$UDID" 2>/dev/null || echo "Already booted"
          xcrun simctl bootstatus "$UDID" -b

      # Cache the compiled WDA binary so it only builds from source on the
      # first run or after the xcuitest driver version changes.
      - name: Cache WDA derived data
        uses: actions/cache@v4
        with:
          path: mobile/e2e/.wda-derived-data
          key: wda-${{ runner.os }}-ios18.5-${{ hashFiles('mobile/package.json') }}

      # Install the XCUITest driver into a project-local APPIUM_HOME so the
      # version is pinned to the repo and isolated from any global Appium install.
      - name: Install Appium XCUITest driver
        working-directory: mobile
        env:
          APPIUM_HOME: ${{ github.workspace }}/mobile/.appium
        run: npm run appium:install-drivers

      - name: Start Appium Server
        working-directory: mobile
        env:
          APPIUM_HOME: ${{ github.workspace }}/mobile/.appium
        run: |
          npx appium --port 4723 --log-level warn > e2e/appium.log 2>&1 &
          echo "APPIUM_PID=$!" >> $GITHUB_ENV
          for i in {1..30}; do
            if curl -s http://127.0.0.1:4723/status > /dev/null; then
              echo "Appium is ready"
              exit 0
            fi
            echo "Waiting for Appium... attempt $i/30"
            sleep 1
          done
          echo "::error::Appium failed to start within 30 seconds"
          exit 1

      - name: Run iOS E2E tests
        working-directory: mobile
        env:
          APP_PATH: ${{ env.APP_PATH }}
          APPIUM_HOME: ${{ github.workspace }}/mobile/.appium
          IOS_DEVICE: "iPhone 16"
          IOS_VERSION: "18.5"
        run: npx wdio run e2e/wdio.ios.conf.ts

      - name: Stop Appium Server
        if: always()
        run: |
          if [ -n "$APPIUM_PID" ]; then
            kill "$APPIUM_PID" || true
          fi

      - name: Upload Appium server log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-ios-appium-log
          path: mobile/e2e/appium.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload failure videos
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-ios-failure-videos
          path: mobile/e2e/videos/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload WDIO results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-ios-wdio-results
          path: |
            mobile/e2e/wdio-*.log
            mobile/e2e/.results/
          retention-days: 7
          if-no-files-found: ignore
