name: CI
on:
  push:
    branches: [main, gh-pages]
  pull_request:
    branches: [main, gh-pages]
  schedule:
    - cron: '0 0 * * *'
permissions:
  contents: write
  pages: write
  id-token: write

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install

      - name: Install Playwright OS dependencies
        run: npx playwright install-deps

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Start app service (Docker Compose)
        run: docker compose up -d --build app api mongo

      - name: Wait for services to be ready
        run: |
          wait_for() {
            local url=$1
            for i in {1..30}; do
              if curl -sSf "$url" > /dev/null 2>&1; then
                echo "✓ $url is ready"
                return 0
              fi
              sleep 1
            done
            echo "✗ $url failed to start"
            return 1
          }
          wait_for http://127.0.0.1:5001/api/colors &
          PID_API=$!
          wait_for http://127.0.0.1:3000 &
          PID_APP=$!
          wait_for http://127.0.0.1:3000/api/colors &
          PID_PROXY=$!
          wait $PID_API $PID_APP $PID_PROXY

      - name: Run end-to-end tests (host Playwright)
        run: npm test -- --video retain-on-failure

      - name: Run BDD tests (host Playwright)
        run: npm run test:bdd -- --video retain-on-failure

      - name: Run cross-browser compatibility tests (host Playwright)
        run: npm run test:cross-browser -- --video retain-on-failure

      - name: Generate LCOV from host-run coverage
        run: npx nyc report --reporter=lcovonly

      - name: Upload host-run coverage to Coveralls
        id: check_lcov
        run: |
          if [ -f coverage/lcov.info ] && [ -s coverage/lcov.info ]; then
            echo "lcov_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "lcov_present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload host-run coverage to Coveralls
        if: steps.check_lcov.outputs.lcov_present == 'true'
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Playwright in Docker Compose for visual regression tests
        run: |
          # Ensure snapshot and test-results dirs exist on the host so the container
          # can read/write them via the volume mounts.
          mkdir -p e2e/snapshots
          mkdir -p test-results
          mkdir -p allure-results

          # Run visual regression tests in the Playwright container.
          docker compose run --rm playwright e2e/tests/visual.spec.ts --video retain-on-failure

      - name: Save docker-compose logs
        if: always()
        run: |
          mkdir -p $GITHUB_WORKSPACE/ci-logs
          docker compose logs > $GITHUB_WORKSPACE/ci-logs/compose-logs.txt || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            test-results/**
            e2e/snapshots/**
            playwright-report/**
            coverage/**
            .nyc_output/**
            ci-logs/**
            allure-results/**

      - name: Load test report history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
            ref: gh-pages
            path: gh-pages  

      - name: Build test report
        uses: simple-elf/allure-report-action@v1.13
        if: always()
        with:
          gh_pages: gh-pages
          allure_history: allure-history
          allure_results: allure-results

      - name: Publish test report
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_branch: gh-pages
            publish_dir: allure-history
            force_orphan: true

      - name: Generate trace viewer link
        if: always()
        run: |
          TRACE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/traces/trace.zip"
          echo "Trace viewer:"
          echo "https://trace.playwright.dev/?trace=$TRACE_URL"
