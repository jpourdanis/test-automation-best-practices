name: CI
on:
  push:
    branches: [main, gh-pages]
  pull_request:
    branches: [main, gh-pages]
  schedule:
    - cron: "0 0 * * *"
permissions:
  contents: write
  pages: write
  id-token: write

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ==========================================
  # 1. STATIC ANALYSIS (Runs independently)
  # ==========================================
  static-code-analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: MegaLinter
        uses: oxsecurity/megalinter@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # 2. SETUP: Run once to cache everything
  # ==========================================
  setup:
    name: Install & Cache Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Root node_modules
        id: cache-root-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-nm-${{ hashFiles('package-lock.json') }}

      - name: Cache Server node_modules
        id: cache-server-nm
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: server-nm-${{ hashFiles('server/package-lock.json') }}

      - name: Install Root Dependencies
        if: steps.cache-root-nm.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Install Server Dependencies
        if: steps.cache-server-nm.outputs.cache-hit != 'true'
        run: cd server && npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install

  # ==========================================
  # 3a. NON-E2E TESTS: Docker Compose Suites
  # ==========================================
  test-suites:
    name: API, BDD, Visual & Cross-Browser
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore Root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-nm-${{ hashFiles('package-lock.json') }}

      - name: Restore Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright OS dependencies
        run: npx playwright install-deps

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Start app service (Docker Compose)
        run: docker compose up -d --build app api mongo

      - name: Health Checks for service
        run: |
          wait_for() {
            local url=$1
            for i in {1..30}; do
              if curl -sSf "$url" > /dev/null 2>&1; then
                echo "✓ $url is ready"
                return 0
              fi
              sleep 1
            done
            echo "✗ $url failed to start"
            return 1
          }
          wait_for http://127.0.0.1:5001/api/colors &
          wait_for http://127.0.0.1:3000 &
          wait_for http://127.0.0.1:3000/api/colors &
          wait

      - name: Run API tests
        continue-on-error: true
        run: npm run test:api

      - name: Run BDD tests
        continue-on-error: true
        run: npm run test:bdd

      - name: Run cross-browser compatibility tests
        continue-on-error: true
        run: npm run test:cross-browser

      - name: Generate code coverage
        run: npx nyc report --reporter=lcovonly

      - name: Run visual regression tests (Docker)
        continue-on-error: true
        run: |
          mkdir -p e2e/snapshots test-results allure-results
          docker compose run --rm playwright e2e/tests/visual.spec.ts

      - name: Upload Suite Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: suite-artifacts
          path: |
            test-results/**
            e2e/snapshots/**
            coverage/**
            allure-results/**

  # ==========================================
  # 3b. E2E SHARDED TESTS: Fast Parallel Execution
  # ==========================================
  e2e-sharded:
    needs: setup
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore Root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-nm-${{ hashFiles('package-lock.json') }}

      - name: Restore Server node_modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: server-nm-${{ hashFiles('server/package-lock.json') }}

      - name: Restore Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright OS dependencies
        run: npx playwright install-deps

      # NOTE: Removed manual "npm start" step! Playwright handles it natively now.
      - name: Run sharded e2e tests
        run: npx cross-env npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} '^(?!.*visual\\.spec\\.ts).*\\.spec\\.ts$'
        env:
          BASE_URL: http://localhost:5001

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

  # ==========================================
  # 4. REPORTING: Merge and Publish Everything
  # ==========================================
  publish-reports:
    name: Merge Reports & Publish
    needs: [test-suites, e2e-sharded]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore Root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-nm-${{ hashFiles('package-lock.json') }}

      - name: Download all suite artifacts
        uses: actions/download-artifact@v4
        with:
          name: suite-artifacts

      - name: Download e2e blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-e2e-blob-reports
          pattern: e2e-blob-report-*
          merge-multiple: true

      - name: Merge E2E Playwright reports
        run: npx playwright merge-reports --reporter html ./all-e2e-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-html-report
          path: playwright-report
          retention-days: 14

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load test report history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report
        uses: simple-elf/allure-report-action@v1.13
        with:
          gh_pages: gh-pages
          allure_history: allure-history
          allure_results: allure-results

      - name: Publish Allure to GH Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true
