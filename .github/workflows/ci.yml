name: CI
on:
  push:
    branches: [main, gh-pages]
  pull_request:
    branches: [main, gh-pages]
  schedule:
    - cron: "0 0 * * *"
permissions:
  contents: write
  pages: write
  id-token: write

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  NYC_OUTPUT_DIR: .nyc_output

jobs:
  # ==========================================
  # 1. STATIC ANALYSIS
  # ==========================================
  static-code-analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      # Checks out the repository code so the workflow can access it
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetches all history for all tags and branches so MegaLinter can check the diff
          fetch-depth: 0

      # Runs MegaLinter to detect issues, formatting errors, and bugs in the codebase
      - name: MegaLinter
        uses: oxsecurity/megalinter/flavors/javascript@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Lint the full codebase on main branch pushes, otherwise only lint changed files in PRs
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'true' || 'false' }}

  # ==========================================
  # 1a. SECURITY TESTING (npm audit & Trivy)
  # ==========================================
  security-testing:
    name: Security Code & Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # Install dependencies to ensure accurate npm audit
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Run npm audit (native Node security scanning)
      - name: NPM Vulnerability Audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # Run Trivy vulnerability scanner on filesystem
      - name: Run Trivy vulnerability scanner on fs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'
          trivy-version: '0.69.3'

      # Build the frontend and API Docker images locally so Trivy can scan them
      # Note: We intentionally do NOT use docker/setup-buildx-action here.
      # The docker-container buildx driver builds images in an isolated BuildKit
      # container and does NOT load them into the local Docker daemon image store,
      # making them invisible to Trivy. Using the default 'docker' driver via
      # plain 'docker compose build' loads images directly into the daemon.
      - name: Build Docker images for container scanning
        run: docker compose build app api

      # Scan the frontend Docker image for OS and dependency vulnerabilities
      - name: Run Trivy vulnerability scanner on frontend image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'image'
          image-ref: 'test-automation-best-practices-app:latest'
          format: 'table'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          trivy-version: '0.69.3'

      # Scan the backend API Docker image for OS and dependency vulnerabilities
      - name: Run Trivy vulnerability scanner on API image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'image'
          image-ref: 'test-automation-best-practices-api:latest'
          format: 'table'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          trivy-version: '0.69.3'

  # ==========================================
  # 1b. MUTATION TESTING (Stryker)
  # ==========================================
  mutation-testing:
    name: Mutation Testing on Server
    runs-on: ubuntu-latest
    steps:
      # Checks out the repository code
      - uses: actions/checkout@v4

      # Sets up Node.js for the mutation testing environment
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      # Installs only the server-side dependencies
      - name: Install server dependencies
        run: npm ci
        working-directory: server

      # Runs unit tests for the server to ensure baseline stability before mutation
      - name: Run unit tests (with JUnit for Allure)
        run: npm test
        working-directory: server

      # Executes Stryker Mutator to measure test suite effectiveness via fault injection
      - name: Run Stryker mutation testing
        run: npm run mutation
        working-directory: server

      # Prepares the results directory for reporting
      - name: Generate Allure environment properties
        if: always()
        working-directory: server
        run: |
          mkdir -p allure-results

      # Preserves the detailed HTML/JSON Stryker mutation reports as build artifacts
      - name: Upload Stryker Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-report
          path: server/reports/
          if-no-files-found: ignore
          retention-days: 7

      # Uploads the Allure results specifically for the mutation test run
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mutation-server
          path: server/allure-results/
          if-no-files-found: ignore
          retention-days: 1

  # ==========================================
  # 1c. MUTATION TESTING (Stryker) - Frontend
  # ==========================================
  mutation-testing-frontend:
    name: Mutation Testing on Frontend
    runs-on: ubuntu-latest
    steps:
      # Checks out the repository code
      - uses: actions/checkout@v4

      # Sets up Node.js for the mutation testing environment
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # Installs all project dependencies (including dev deps for Stryker)
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Runs unit tests for the frontend to ensure baseline stability
      - name: Run unit tests
        run: npm run test:unit

      # Executes Stryker Mutator to measure frontend test suite effectiveness
      - name: Run Stryker mutation testing
        run: npm run mutation:frontend

      # Preserves the detailed HTML/JSON Stryker mutation reports as build artifacts
      - name: Upload Stryker Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-report-frontend
          path: reports/mutation/frontend/
          if-no-files-found: ignore
          retention-days: 7

      # Uploads the Allure results specifically for the frontend mutation test run
      # Note: We need to ensure Allure results are generated if configured in Stryker
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mutation-frontend
          path: allure-results/
          if-no-files-found: ignore
          retention-days: 1

  # ==========================================
  # 2a. NON-SHARDED TESTS (API, BDD, Visual, etc.)
  # ==========================================
  tests-misc:
    name: API, BDD, Visual Regression, Cross-Browser Tests
    runs-on: ubuntu-latest
    steps:
      # Checks out the code
      - uses: actions/checkout@v4

      # Sets up Node.js for this job
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # Installs project dependencies
      - run: npm ci --legacy-peer-deps

      # Restores the Playwright browsers (if cached) or installs them if missing
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      # Installs Playwright browsers if they were not found in the cache
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install

      # Installs OS-level dependencies required by Playwright browsers (e.g., fonts, libraries)
      - name: Install Playwright OS dependencies
        run: npx playwright install-deps

      # Configures Docker Buildx to enable advanced build features like layer caching
      # config-inline wires the GHA cache backend into the BuildKit daemon so that
      # the cache_from/cache_to: type=gha entries in docker-compose.yml are honoured.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          config-inline: |
            [registry]
            [worker.oci]
              max-parallelism = 4
            [worker.containerd]
              max-parallelism = 4

            [cache]
              [cache.gha]
                token = "${{ env.ACTIONS_RUNTIME_TOKEN }}"
                url   = "${{ env.ACTIONS_CACHE_URL }}"
                scope = "buildkit"

      # Spins up the application frontend, backend API, and MongoDB database via Docker
      - name: Start app service (Docker Compose)
        run: docker compose up -d --build app api mongo

      # Waits until the frontend and backend services are fully running and responding to requests
      - name: Health Checks for service
        run: |
          wait_for() {
            local url=$1
            for i in {1..90}; do
              if curl -sSf "$url" > /dev/null 2>&1; then
                echo "✓ $url is ready"
                return 0
              fi
              sleep 1
            done
            echo "✗ $url failed to start"
            return 1
          }
          wait_for http://127.0.0.1:5001/api/colors &
          PID_API=$!
          wait_for http://127.0.0.1:3000 &
          PID_APP=$!
          wait_for http://127.0.0.1:3000/api/colors &
          PID_PROXY=$!
          wait $PID_API $PID_APP $PID_PROXY

      # Runs fast API tests first; failures here indicate backend issues
      - name: Run API tests
        id: api-tests
        continue-on-error: true
        run: npm run test:api

      # Runs Behavior-Driven Development (Cucumber) tests
      - name: Run BDD tests
        id: bdd-tests
        continue-on-error: true
        run: npm run test:bdd

      # Runs tests across Chromium, Firefox, and WebKit to ensure comprehensive compatibility
      - name: Run cross-browser compatibility tests
        id: cross-browser-tests
        continue-on-error: true
        run: npm run test:cross-browser

      # Executes visual regression checks inside a Docker container for identical pixel rendering
      - name: Run Playwright in Docker Compose for visual regression
        id: visual-tests
        continue-on-error: true
        run: |
          mkdir -p e2e/snapshots test-results allure-results
          docker compose run --rm playwright e2e/tests/visual.spec.ts
      # Packs and uploads the generated test artifacts (reports, traces, snapshots) for download
      - name: Upload Misc Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: misc-test-artifacts
          path: |
            test-results/**
            e2e/snapshots/**
            allure-results/**

      # List coverage summary for visibility
      - name: Coverage Summary
        if: always()
        run: |
          if [ -d "${{ env.NYC_OUTPUT_DIR }}" ] && [ "$(ls -A ${{ env.NYC_OUTPUT_DIR }} 2>/dev/null)" ]; then
            npx nyc report --temp-dir=${{ env.NYC_OUTPUT_DIR }} --reporter=text
          else
            echo "No coverage data collected in this job."
          fi

      # List coverage data for debugging
      - name: List coverage data
        if: always()
        run: |
          if [ -d "${{ env.NYC_OUTPUT_DIR }}" ]; then
            ls -al ${{ env.NYC_OUTPUT_DIR }}
          else
            echo "${{ env.NYC_OUTPUT_DIR }} directory not found"
          fi

      # Uploads Istanbul coverage data collected by baseFixtures for merging
      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nyc-output-misc
          path: ${{ env.NYC_OUTPUT_DIR }}
          if-no-files-found: ignore
          retention-days: 1
          include-hidden-files: true

      # Aborts the pipeline at the end if any of the preceding step sets failed
      - name: Fail pipeline if misc tests failed
        if: always() && (steps.api-tests.outcome == 'failure' || steps.bdd-tests.outcome == 'failure' || steps.cross-browser-tests.outcome == 'failure' || steps.visual-tests.outcome == 'failure')
        run: exit 1

  # ==========================================
  # 2b. API PROPERTY TESTING (Schemathesis)
  # ==========================================
  api-property-testing:
    name: API Property Based Testing
    runs-on: ubuntu-latest
    steps:
      # Checks out the repository code
      - uses: actions/checkout@v4

      # Configures Docker Buildx to enable advanced build features like layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          config-inline: |
            [registry]
            [worker.oci]
              max-parallelism = 4
            [worker.containerd]
              max-parallelism = 4

            [cache]
              [cache.gha]
                token = "${{ env.ACTIONS_RUNTIME_TOKEN }}"
                url   = "${{ env.ACTIONS_CACHE_URL }}"
                scope = "buildkit"

      # Spins up the backend API and MongoDB database via Docker for testing
      - name: Start app service (Docker Compose)
        run: docker compose up -d --build api mongo

      # Verifies the API is up and responding before starting property-based tests
      - name: Health Checks for service
        run: |
          wait_for() {
            local url=$1
            for i in {1..90}; do
              if curl -sSf "$url" > /dev/null 2>&1; then
                echo "✓ $url is ready"
                return 0
              fi
              sleep 1
            done
            echo "✗ $url failed to start"
            return 1
          }
          wait_for http://127.0.0.1:5001/api/colors
      
      # Runs Schemathesis against the OpenAPI spec to discover edge-case bugs via property testing
      - name: Run schemathesis tests
        uses: schemathesis/action@v2
        with:
          schema: http://127.0.0.1:5001/openapi.json
          checks: all
          args: --suppress-health-check=filter_too_much --report-junit-path=allure-results/schemathesis-junit.xml

      # Uploads the Schemathesis execution results for inclusion in the final Allure report
      - name: Upload Schemathesis Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-schemathesis
          path: allure-results/**
          retention-days: 1

  # ==========================================
  # 2b. SHARDED E2E TESTS (Parallel Execution)
  # ==========================================
  e2e-sharded:
    name: E2E Tests Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    runs-on: ubuntu-latest
    # Strategy matrix allows running multiple instances of this job concurrently
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      # Checks out the code for this specific shard runner
      - uses: actions/checkout@v4

      # Sets up Node.js for this shard runner
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # Installs project dependencies
      - run: npm ci --legacy-peer-deps

      # Restores the Playwright browsers (if cached) or installs them if missing
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      # Installs Playwright browsers if they were not found in the cache
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install

      # Installs OS dependencies required by browsers
      - name: Install Playwright OS dependencies
        run: npx playwright install-deps

      # Sets up Docker Buildx for advanced image building
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          config-inline: |
            [registry]
            [worker.oci]
              max-parallelism = 4
            [worker.containerd]
              max-parallelism = 4

            [cache]
              [cache.gha]
                token = "${{ env.ACTIONS_RUNTIME_TOKEN }}"
                url   = "${{ env.ACTIONS_CACHE_URL }}"
                scope = "buildkit"

      # Completely isolated environment spin-up for this exact shard runner
      - name: Start app service (Docker Compose)
        run: docker compose up -d --build app api mongo

      # Verifies the application is healthy inside this shard's Docker environment
      - name: Health Checks for service
        run: |
          wait_for() {
            local url=$1
            for i in {1..90}; do
              if curl -sSf "$url" > /dev/null 2>&1; then
                echo "✓ $url is ready"
                return 0
              fi
              sleep 1
            done
            return 1
          }
          wait_for http://127.0.0.1:5001/api/colors &
          PID_API=$!
          wait_for http://127.0.0.1:3000 &
          PID_APP=$!
          wait_for http://127.0.0.1:3000/api/colors &
          PID_PROXY=$!
          wait $PID_API $PID_APP $PID_PROXY

      # Executes precisely the assigned fraction (shard) of the test suite (skipping visual tests)
      - name: Run sharded e2e tests
        run: |
          mkdir -p ${{ env.NYC_OUTPUT_DIR }}
          npx playwright test '^(?!.*visual\.spec\.ts).*\.spec\.ts$' --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --reporter=blob,allure-playwright

      # List coverage summary for visibility
      - name: Coverage Summary (Shard ${{ matrix.shardIndex }})
        if: always()
        run: |
          if [ -d "${{ env.NYC_OUTPUT_DIR }}" ] && [ "$(ls -A ${{ env.NYC_OUTPUT_DIR }} 2>/dev/null)" ]; then
            npx nyc report --temp-dir=${{ env.NYC_OUTPUT_DIR }} --reporter=text
          else
            echo "No coverage data collected in this shard."
          fi

      # Uploads the fragmented Playwright execution data (blob) to be merged later
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

      # List coverage data for debugging
      - name: List coverage data
        if: always()
        run: |
          if [ -d "${{ env.NYC_OUTPUT_DIR }}" ]; then
            ls -al ${{ env.NYC_OUTPUT_DIR }}
          else
            echo "${{ env.NYC_OUTPUT_DIR }} directory not found"
          fi

      # Uploads Istanbul coverage data from this shard for merging
      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nyc-output-shard-${{ matrix.shardIndex }}
          path: ${{ env.NYC_OUTPUT_DIR }}
          if-no-files-found: ignore
          retention-days: 1
          include-hidden-files: true

      # Uploads the raw Allure test result tracking data for this shard fraction
      - name: Upload Allure Results for Shard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shardIndex }}
          path: allure-results/**
          retention-days: 1

  # ==========================================
  # 2c. PERFORMANCE TESTS (k6)
  # ==========================================
  performance-testing:
    name: API & UI Performance Tests
    runs-on: ubuntu-latest
    steps:
      # Checks out the repository code
      - uses: actions/checkout@v4

      # Configures Docker Buildx to enable advanced build features like layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          config-inline: |
            [registry]
            [worker.oci]
              max-parallelism = 4
            [worker.containerd]
              max-parallelism = 4

            [cache]
              [cache.gha]
                token = "${{ env.ACTIONS_RUNTIME_TOKEN }}"
                url   = "${{ env.ACTIONS_CACHE_URL }}"
                scope = "buildkit"

      # Spins up the application frontend, backend API, and MongoDB database via Docker
      - name: Start app service (Docker Compose)
        run: docker compose up -d --build app api mongo

      # Waits until the frontend and backend services are fully running and responding to requests
      - name: Health Checks for service
        run: |
          wait_for() {
            local url=$1
            for i in {1..90}; do
              if curl -sSf "$url" > /dev/null 2>&1; then
                echo "✓ $url is ready"
                return 0
              fi
              sleep 1
            done
            echo "✗ $url failed to start"
            return 1
          }
          wait_for http://127.0.0.1:5001/api/colors &
          PID_API=$!
          wait_for http://127.0.0.1:3000 &
          PID_APP=$!
          wait_for http://127.0.0.1:3000/api/colors &
          PID_PROXY=$!
          wait $PID_API $PID_APP $PID_PROXY

      # Installs k6 performance testing tool with browser support
      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          browser: true

      # Executes k6 smoke tests against the API to verify baseline latency and throughput
      - name: Run API Performance Test
        run: |
          mkdir -p allure-results
          npm run test:perf:api:smoke

      # Executes k6 smoke tests against the UI using browser automation to verify frontend performance
      - name: Run UI Performance Test
        env:
          K6_BROWSER_ENABLED: true
          K6_BROWSER_ARGS: no-sandbox
        run: npm run test:perf:ui:smoke

      # Uploads the k6 execution data (JUnit/Allure) for inclusion in the final report
      - name: Upload k6 Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-k6
          path: allure-results/**
          retention-days: 1


  # ==========================================
  # 3. REPORTING & PUBLISHING (The Fan-In)
  # ==========================================
  publish-reports:
    name: Merge Reports & Publish
    # This job 'fans in', running only after all the test runners finish
    needs: [tests-misc, api-property-testing, e2e-sharded, performance-testing, mutation-testing, mutation-testing-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # Checks out the code to gather reporting logic
      - uses: actions/checkout@v4

      # Sets up Node JS
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # Installs reporting dependencies via package-lock.json
      - run: npm ci --legacy-peer-deps

      # Downloads the artifacts generated by the non-sharded test runner
      - name: Download Misc Artifacts
        uses: actions/download-artifact@v4
        with:
          name: misc-test-artifacts

      # Downloads the fractional blob reports from every concurrent shard runner
      - name: Download all Playwright blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: e2e-blob-report-*
          merge-multiple: true

      # Downloads the raw Allure results from every concurrent shard runner
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          pattern: allure-results-*
          merge-multiple: true

      # Merges the distributed Playwright blobs into a single readable HTML report
      - name: Merge Playwright Reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      # Uploads the finalized, unified Playwright HTML report
      - name: Upload Merged Playwright HTML
        uses: actions/upload-artifact@v4
        with:
          name: playwright-merged-html-report
          path: playwright-report

      # Downloads coverage data from all test jobs and merges into .nyc_output
      - name: Download all coverage data
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.NYC_OUTPUT_DIR }}
          pattern: nyc-output-*
          merge-multiple: true

      # Generates unified lcov report from merged coverage data
      - name: Generate merged code coverage
        run: |
          mkdir -p ${{ env.NYC_OUTPUT_DIR }}
          if [ "$(ls -A ${{ env.NYC_OUTPUT_DIR }})" ]; then
            npx nyc report --temp-dir=${{ env.NYC_OUTPUT_DIR }} --reporter=lcovonly
          else
            echo "No coverage data found in ${{ env.NYC_OUTPUT_DIR }}. Creating empty lcov.info."
            mkdir -p coverage
            touch coverage/lcov.info
          fi

      # Fails the pipeline if code coverage drops below 80%
      - name: Enforce 80% Code Coverage Gate
        continue-on-error: true
        run: |
          if [ -f "coverage/lcov.info" ] && [ -s "coverage/lcov.info" ]; then
            npm run coverage:check
          else
            echo "Skipping coverage check: lcov.info is missing or empty."
          fi

      # Publishes the merged test coverage to Coveralls dashboard
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@master
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Checks out the gh-pages branch to access historical Allure test data
      - name: Load test report history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # Consolidates new and historical results into a new interactive Allure build report
      - name: Build Allure report
        uses: simple-elf/allure-report-action@v1.13
        with:
          gh_pages: gh-pages
          allure_history: allure-history
          allure_results: allure-results

      - name: Copy summary.json for Badges
        run: |
          sudo mkdir -p allure-history/widgets
          sudo cp allure-history/${{ github.run_number }}/widgets/summary.json allure-history/widgets/summary.json

      # Commits the new Allure trend graphs and test statuses directly to GitHub Pages
      - name: Publish test report to GH Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true
