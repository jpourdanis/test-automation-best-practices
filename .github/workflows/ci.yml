name: CI
on:
  push:
    branches: [main, gh-pages]
  pull_request:
    branches: [main, gh-pages]
  schedule:
    - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
  pages: write
  id-token: write

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  NYC_OUTPUT_DIR: .nyc_output
  K6_LOG_LEVEL: debug

jobs:
  # ==========================================
  # 1. STATIC ANALYSIS
  # ==========================================
  static-code-analysis:
    name: Static Code Analysis
    needs: [publish-reports]
    runs-on: ubuntu-latest
    steps:
      # Checks out the repository code so the workflow can access it
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetches all history for all tags and branches so MegaLinter can check the diff
          fetch-depth: 0

      # Runs MegaLinter to detect issues, formatting errors, and bugs in the codebase
      - name: MegaLinter
        uses: oxsecurity/megalinter/flavors/javascript@v9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Lint the full codebase on main branch pushes, otherwise only lint changed files in PRs
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'true' || 'false' }}

      - name: Download Merged Coverage
        uses: actions/download-artifact@v8
        with:
          name: merged-lcov
          path: coverage

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # 1a. UNIT TESTING (API)
  # ==========================================
  backend-unit-tests:
    name: Unit Tests (Backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-env
        with:
          working-directory: server

      - name: Run Backend Unit Tests
        env:
          JEST_JUNIT_OUTPUT_NAME: junit-api-unit-tests.xml
        run: npm test
        working-directory: server

      - name: Upload Backend Unit Test Allure Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-api-unit-testing
          path: server/allure-results/
          retention-days: 1

      - name: Upload Backend Unit Coverage
        if: always()
        run: |
          mkdir -p coverage-unit
          cp server/coverage/coverage-final.json coverage-unit/backend-unit.json
      - uses: actions/upload-artifact@v7
        with:
          name: nyc-output-backend-unit
          path: coverage-unit/backend-unit.json
          retention-days: 1

  # ==========================================
  # 1a-2. INTEGRATION TESTING (API)
  # ==========================================
  backend-integration-tests:
    name: Integration Tests (Backend)
    needs: [backend-unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-env
        with:
          working-directory: server

      - name: Run Backend Integration Tests
        env:
          JEST_JUNIT_OUTPUT_NAME: junit-api-integration-tests.xml
        run: npm run test:int
        working-directory: server

      - name: Upload Integration Testing Allure Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-api-integration-testing
          path: server/allure-results/
          retention-days: 1

      - name: Upload Backend Integration Coverage
        if: always()
        run: |
          mkdir -p coverage-int
          cp server/coverage/coverage-final.json coverage-int/backend-int.json
      - uses: actions/upload-artifact@v7
        with:
          name: nyc-output-backend-int
          path: coverage-int/backend-int.json
          retention-days: 1

  # ==========================================
  # 1b. UNIT TESTING (Frontend)
  # ==========================================
  frontend-unit-tests:
    name: Unit Tests (Frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-env

      - name: Run Frontend Unit Tests
        run: npm run test:unit

      - name: Upload Frontend Unit Test Allure Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-frontend-unit-testing
          path: allure-results/
          retention-days: 1

      - name: Upload Frontend Unit Coverage
        if: always()
        run: |
          mkdir -p coverage-frontend
          cp coverage/coverage-final.json coverage-frontend/frontend-unit.json
      - uses: actions/upload-artifact@v7
        with:
          name: nyc-output-frontend-unit
          path: coverage-frontend/frontend-unit.json
          retention-days: 1

  # ==========================================
  # 1c. SECURITY TESTING (npm audit & Trivy FS)
  # ==========================================
  security-testing-fs:
    name: Security Tests (Frontend & Backend)
    needs: [backend-unit-tests, frontend-unit-tests]
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-env

      - name: NPM Vulnerability Audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Create Allure results directory
        run: mkdir -p allure-results

      - name: Download Trivy JUnit template
        run: curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/junit.tpl -o junit.tpl

      - name: Run Trivy vulnerability scanner on fs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: "fs"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          trivy-version: "0.69.3"
          # Fail the pipeline and output as JUnit for Allure
          exit-code: "1"
          format: "template"
          template: "@${{ github.workspace }}/junit.tpl"
          output: "allure-results/trivy-fs.xml"

      - name: Snyk Infrastructure as Code (IaC) Scan
        uses: snyk/actions/node@v1.0.0
        continue-on-error: true
        with:
          command: iac test
          args: --org=${{ secrets.SNYK_ORG }} docker-compose.yml

      - name: Upload Trivy FS Allure Results
        if: always() # Ensure this runs even if Trivy fails the build
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-security-fs
          path: allure-results/
          retention-days: 1

  # ==========================================
  # 1d. SECURITY TESTING (Frontend Image)
  # ==========================================
  security-testing-frontend:
    name: Security Tests (Containers - Frontend)
    needs: [frontend-unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Build Frontend Docker image for container scanning
        run: docker compose build app

      - name: Create Allure results directory
        run: mkdir -p allure-results

      - name: Download Trivy JUnit template
        run: curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/junit.tpl -o junit.tpl

      - name: Run Trivy vulnerability scanner on frontend image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: "image"
          image-ref: "test-automation-best-practices-app:latest"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          trivy-version: "0.69.3"
          format: "template"
          template: "@${{ github.workspace }}/junit.tpl"
          output: "allure-results/trivy-frontend.xml"

      - name: Run Snyk Container scan on frontend image
        uses: snyk/actions/docker@v1.0.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: "test-automation-best-practices-app:latest"
          args: --org=${{ secrets.SNYK_ORG }} --file=Dockerfile

      - name: Upload Trivy Frontend Allure Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-security-frontend
          path: allure-results/
          retention-days: 1

  # ==========================================
  # 1e. SECURITY TESTING (API Image)
  # ==========================================
  security-testing-api:
    name: Security Tests (Containers - Backend)
    needs: [backend-unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Build API Docker image for container scanning
        run: docker compose build api

      - name: Create Allure results directory
        run: mkdir -p allure-results

      - name: Download Trivy JUnit template
        run: curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/junit.tpl -o junit.tpl

      - name: Run Trivy vulnerability scanner on API image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: "image"
          image-ref: "test-automation-best-practices-api:latest"
          severity: "CRITICAL,HIGH"
          trivy-version: "0.69.3"
          exit-code: "1"
          format: "template"
          template: "@${{ github.workspace }}/junit.tpl"
          output: "allure-results/trivy-api.xml"
          ignorefile: ".trivyignore"

      - name: Run Snyk Container scan on API image
        uses: snyk/actions/docker@v1.0.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: "test-automation-best-practices-api:latest"
          args: --org=${{ secrets.SNYK_ORG }} --file=server/Dockerfile

      - name: Upload Trivy API Allure Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-security-api
          path: allure-results/
          retention-days: 1
  # ==========================================
  # 1f. MUTATION TESTING (Stryker)
  # ==========================================
  mutation-testing:
    name: Mutation Tests (Backend)
    needs: [backend-unit-tests]
    runs-on: ubuntu-latest
    steps:
      # Checks out the repository code
      - uses: actions/checkout@v6

      # Sets up Node.js for the mutation testing environment
      - uses: ./.github/actions/setup-node-env
        with:
          working-directory: server

      # Runs unit tests for the server to ensure baseline stability before mutation
      - name: Run unit tests (with JUnit for Allure)
        env:
          JEST_JUNIT_OUTPUT_NAME: junit-api-mutation-baseline.xml
        run: npm test
        working-directory: server

      # Executes Stryker Mutator to measure test suite effectiveness via fault injection
      - name: Run Stryker mutation testing
        run: npm run mutation
        working-directory: server

      # Prepares the results directory for reporting
      - name: Generate Allure environment properties
        if: always()
        working-directory: server
        run: |
          mkdir -p allure-results

      # Preserves the detailed HTML/JSON Stryker mutation reports as build artifacts
      - name: Upload Stryker Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stryker-mutation-report
          path: server/reports/
          if-no-files-found: ignore
          retention-days: 7

      # Uploads the Allure results specifically for the mutation test run
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-api-mutation-testing
          path: server/allure-results/
          if-no-files-found: ignore
          retention-days: 1

  # ==========================================
  # 1g. MUTATION TESTING (Stryker) - Frontend
  # ==========================================
  mutation-testing-frontend:
    name: Mutation Tests (Frontend)
    needs: [frontend-unit-tests]
    runs-on: ubuntu-latest
    steps:
      # Checks out the repository code
      - uses: actions/checkout@v6

      # Sets up Node.js for the mutation testing environment
      - uses: ./.github/actions/setup-node-env

      # Runs unit tests for the frontend to ensure baseline stability
      - name: Run unit tests
        run: npm run test:unit

      # Executes Stryker Mutator to measure frontend test suite effectiveness
      - name: Run Stryker mutation testing
        run: npm run mutation:frontend

      # Preserves the detailed HTML/JSON Stryker mutation reports as build artifacts
      - name: Upload Stryker Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stryker-mutation-report-frontend
          path: reports/mutation/frontend/
          if-no-files-found: ignore
          retention-days: 7

      # Uploads the Allure results specifically for the frontend mutation test run
      # Note: We need to ensure Allure results are generated if configured in Stryker
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-frontend-mutation-testing
          path: allure-results/
          if-no-files-found: ignore
          retention-days: 1

  # ==========================================
  # 2a. NON-SHARDED TESTS (API, BDD, Visual, etc.)
  # ==========================================
  tests-misc:
    name: UI & Integration Tests (Misc)
    needs: [backend-integration-tests, frontend-unit-tests]
    runs-on: ubuntu-latest
    steps:
      # Checks out the code
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-env

      # Restores the Playwright browsers (if cached) or installs them if missing
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      # Installs Playwright browsers if they were not found in the cache
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install

      # Installs OS-level dependencies required by Playwright browsers (e.g., fonts, libraries)
      - name: Install Playwright OS dependencies
        run: npx playwright install-deps

      # Configures Docker Buildx to enable advanced build features like layer caching
      # config-inline wires the GHA cache backend into the BuildKit daemon so that
      # the cache_from/cache_to: type=gha entries in docker-compose.yml are honoured.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          config-inline: |
            [registry]
            [worker.oci]
              max-parallelism = 4
            [worker.containerd]
              max-parallelism = 4

            [cache]
              [cache.gha]
                token = "${{ env.ACTIONS_RUNTIME_TOKEN }}"
                url   = "${{ env.ACTIONS_CACHE_URL }}"
                scope = "buildkit"

      # Spins up the application frontend, backend API, and MongoDB database via Docker
      - name: Start app service (Docker Compose)
        run: docker compose up -d --build --wait app api mongo

      # Runs fast API tests first; failures here indicate backend issues
      - name: Run API tests
        id: api-tests
        continue-on-error: true
        run: npm run test:api

      # Runs Behavior-Driven Development (Cucumber) tests
      - name: Run BDD tests
        id: bdd-tests
        continue-on-error: true
        run: npm run test:bdd

      # Runs tests across Chromium, Firefox, and WebKit to ensure comprehensive compatibility
      - name: Run cross-browser compatibility tests
        id: cross-browser-tests
        continue-on-error: true
        run: npm run test:cross-browser

      # Executes visual regression checks inside a Docker container for identical pixel rendering
      - name: Run Playwright in Docker Compose for visual regression
        id: visual-tests
        continue-on-error: true
        run: |
          mkdir -p e2e/snapshots test-results allure-results
          docker compose run --rm playwright e2e/tests/visual.spec.ts
      # Uploads Allure Results for Merge
      - name: Upload Allure Results Misc
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-misc-tests
          path: allure-results/
          retention-days: 1

      # Packs and uploads the generated test artifacts (reports, traces, snapshots) for download
      - name: Upload Misc Test Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: misc-test-artifacts
          path: |
            test-results/**
            e2e/snapshots/**

      # List coverage summary for visibility
      - name: Coverage Summary
        if: always()
        run: |
          if [ -d "${{ env.NYC_OUTPUT_DIR }}" ] && [ "$(ls -A ${{ env.NYC_OUTPUT_DIR }} 2>/dev/null)" ]; then
            npx nyc report --temp-dir=${{ env.NYC_OUTPUT_DIR }} --reporter=text
          else
            echo "No coverage data collected in this job."
          fi

      # List coverage data for debugging
      - name: List coverage data
        if: always()
        run: |
          if [ -d "${{ env.NYC_OUTPUT_DIR }}" ]; then
            ls -al ${{ env.NYC_OUTPUT_DIR }}
          else
            echo "${{ env.NYC_OUTPUT_DIR }} directory not found"
          fi

      # Uploads Istanbul coverage data collected by baseFixtures for merging
      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nyc-output-misc
          path: ${{ env.NYC_OUTPUT_DIR }}
          if-no-files-found: ignore
          retention-days: 1
          include-hidden-files: true

      # Aborts the pipeline at the end if any of the preceding step sets failed
      - name: Fail pipeline if misc tests failed
        if: always() && (steps.api-tests.outcome == 'failure' || steps.bdd-tests.outcome == 'failure' || steps.cross-browser-tests.outcome == 'failure' || steps.visual-tests.outcome == 'failure')
        run: exit 1

  # ==========================================
  # 2b. API PROPERTY TESTING (Schemathesis)
  # ==========================================
  api-property-testing:
    name: Property-Based Tests (Backend)
    needs: [backend-integration-tests]
    runs-on: ubuntu-latest
    steps:
      # Checks out the repository code
      - uses: actions/checkout@v6

      # Configures Docker Buildx to enable advanced build features like layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          config-inline: |
            [registry]
            [worker.oci]
              max-parallelism = 4
            [worker.containerd]
              max-parallelism = 4

            [cache]
              [cache.gha]
                token = "${{ env.ACTIONS_RUNTIME_TOKEN }}"
                url   = "${{ env.ACTIONS_CACHE_URL }}"
                scope = "buildkit"

      # Spins up the backend API and MongoDB database via Docker for testing
      - name: Start app service (Docker Compose)
        run: docker compose up -d --build --wait api mongo

      # Runs Schemathesis against the OpenAPI spec to discover edge-case bugs via property testing
      - name: Run schemathesis tests
        uses: schemathesis/action@v3
        with:
          schema: http://127.0.0.1:5001/openapi.json
          checks: all
          args: --suppress-health-check=filter_too_much --report-junit-path=allure-results/schemathesis-junit.xml

      # Uploads the Schemathesis execution results for inclusion in the final Allure report
      - name: Upload Schemathesis Allure Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-api-property-testing
          path: allure-results/
          retention-days: 1

  # ==========================================
  # 2b. SHARDED E2E TESTS (Parallel Execution)
  # ==========================================
  e2e-sharded:
    name: E2E Tests (Sharded - ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    needs: [backend-integration-tests, frontend-unit-tests]
    runs-on: ubuntu-latest
    # Strategy matrix allows running multiple instances of this job concurrently
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      # Checks out the code for this specific shard runner
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-env

      # Restores the Playwright browsers (if cached) or installs them if missing
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      # Installs Playwright browsers if they were not found in the cache
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install

      # Installs OS dependencies required by browsers
      - name: Install Playwright OS dependencies
        run: npx playwright install-deps

      # Sets up Docker Buildx for advanced image building
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          config-inline: |
            [registry]
            [worker.oci]
              max-parallelism = 4
            [worker.containerd]
              max-parallelism = 4

            [cache]
              [cache.gha]
                token = "${{ env.ACTIONS_RUNTIME_TOKEN }}"
                url   = "${{ env.ACTIONS_CACHE_URL }}"
                scope = "buildkit"

      # Completely isolated environment spin-up for this exact shard runner
      - name: Start app service (Docker Compose)
        run: docker compose up -d --build --wait app api mongo

      # Executes precisely the assigned fraction (shard) of the test suite (skipping visual tests)
      - name: Run sharded e2e tests
        run: |
          mkdir -p ${{ env.NYC_OUTPUT_DIR }}
          npx playwright test '^(?!.*visual\.spec\.ts).*\.spec\.ts$' --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --reporter=blob,allure-playwright

      # List coverage summary for visibility
      - name: Coverage Summary (Shard ${{ matrix.shardIndex }})
        if: always()
        run: |
          if [ -d "${{ env.NYC_OUTPUT_DIR }}" ] && [ "$(ls -A ${{ env.NYC_OUTPUT_DIR }} 2>/dev/null)" ]; then
            npx nyc report --temp-dir=${{ env.NYC_OUTPUT_DIR }} --reporter=text
          else
            echo "No coverage data collected in this shard."
          fi

      # Uploads the fragmented Playwright execution data (blob) to be merged later
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

      # List coverage data for debugging
      - name: List coverage data
        if: always()
        run: |
          if [ -d "${{ env.NYC_OUTPUT_DIR }}" ]; then
            ls -al ${{ env.NYC_OUTPUT_DIR }}
          else
            echo "${{ env.NYC_OUTPUT_DIR }} directory not found"
          fi

      # Uploads Istanbul coverage data from this shard for merging
      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nyc-output-shard-${{ matrix.shardIndex }}
          path: ${{ env.NYC_OUTPUT_DIR }}
          if-no-files-found: ignore
          retention-days: 1
          include-hidden-files: true

      # Uploads the raw Allure test result tracking data for this shard fraction
      - name: Upload Allure Results for Shard
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-e2e-shard-${{ matrix.shardIndex }}
          path: allure-results/
          retention-days: 1

  # ==========================================
  # 2c-1. PERFORMANCE TESTING (k6 API)
  # ==========================================
  performance-testing-api:
    name: Performance Tests (Backend)
    needs: [backend-integration-tests]
    runs-on: ubuntu-latest
    steps:
      # Checks out the repository code
      - uses: actions/checkout@v6

      # Configures Docker Buildx to enable advanced build features like layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          config-inline: |
            [registry]
            [worker.oci]
              max-parallelism = 4
            [worker.containerd]
              max-parallelism = 4

            [cache]
              [cache.gha]
                token = "${{ env.ACTIONS_RUNTIME_TOKEN }}"
                url   = "${{ env.ACTIONS_CACHE_URL }}"
                scope = "buildkit"

      # Starts the backend API and MongoDB database via Docker
      - name: Start API & Mongo (Docker Compose)
        run: docker compose up -d --build --wait api mongo

      # Installs k6 performance testing tool
      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Executes k6 smoke tests against the API
      - name: Run API Performance Test
        run: |
          mkdir -p allure-results
          npm run test:perf:api:smoke

      # Uploads the k6 execution data (JUnit/Allure)
      - name: Upload k6 API Allure Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-performance-api
          path: allure-results/
          retention-days: 1

  # ==========================================
  # 2c-2. PERFORMANCE TESTING (k6 UI)
  # ==========================================
  performance-testing-frontend:
    name: Performance Tests (Frontend)
    needs: [backend-integration-tests, frontend-unit-tests]
    runs-on: ubuntu-latest
    steps:
      # Checks out the repository code
      - uses: actions/checkout@v6

      # Configures Docker Buildx to enable advanced build features like layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          config-inline: |
            [registry]
            [worker.oci]
              max-parallelism = 4
            [worker.containerd]
              max-parallelism = 4

            [cache]
              [cache.gha]
                token = "${{ env.ACTIONS_RUNTIME_TOKEN }}"
                url   = "${{ env.ACTIONS_CACHE_URL }}"
                scope = "buildkit"

      # Spins up the application frontend, backend API, and MongoDB database via Docker
      - name: Start Full Stack (Docker Compose)
        run: docker compose up -d --build --wait app api mongo

      - name: Install DBus for Headless Browser
        run: sudo apt-get update && sudo apt-get install -y dbus dbus-x11

      # Installs k6 performance testing tool with browser support
      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          browser: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run UI Performance Test
        env:
          K6_BROWSER_ENABLED: "true"
          TEST_TYPE: "smoke"
        # dbus-run-session creates a virtual bus just for this test, allowing safe teardown
        run: |
          mkdir -p allure-results
          dbus-run-session -- k6 run performance/ui-performance.spec.ts

      # Uploads the k6 execution data (JUnit/Allure)
      - name: Upload k6 UI Allure Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-performance-frontend
          path: allure-results/
          retention-days: 1

  # ==========================================
  # 2d. E2E TESTING (Production / Ephemeral)
  # ==========================================
  e2e-production-tests:
    name: E2E Tests Against Ephemeral Environment
    needs:
      [
        security-testing-fs,
        security-testing-frontend,
        security-testing-api,
        tests-misc,
        api-property-testing,
        e2e-sharded,
        performance-testing-api,
        performance-testing-frontend,
        mutation-testing,
        mutation-testing-frontend,
        backend-unit-tests,
        backend-integration-tests,
        frontend-unit-tests
      ]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-env

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Deploy to Vercel (Preview)
        id: vercel-deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run E2E tests against Vercel Preview
        env:
          BASE_URL: ${{ steps.vercel-deploy.outputs.preview-url }}
        run: npm run test:e2e:prod

      - name: Upload Allure Results Production
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-production-tests
          path: allure-results/
          retention-days: 1

  # ==========================================
  # 3. REPORTING & PUBLISHING (The Fan-In)
  # ==========================================
  publish-reports:
    name: Merge Reports & Publish
    # This job 'fans in', running only after all the test runners finish
    needs:
      [
        security-testing-fs,
        security-testing-frontend,
        security-testing-api,
        tests-misc,
        api-property-testing,
        e2e-sharded,
        performance-testing-api,
        performance-testing-frontend,
        mutation-testing,
        mutation-testing-frontend,
        backend-unit-tests,
        backend-integration-tests,
        frontend-unit-tests,
        e2e-production-tests
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # Checks out the code to gather reporting logic
      - uses: actions/checkout@v6

      # Sets up Node JS and installs reporting dependencies
      - uses: ./.github/actions/setup-node-env

      # Downloads the artifacts generated by the non-sharded test runner
      - name: Download Misc Artifacts
        if: needs.tests-misc.result != 'skipped'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: misc-test-artifacts

      # Downloads the fractional blob reports from every concurrent shard runner
      - name: Download all Playwright blob reports
        if: needs.e2e-sharded.result != 'skipped'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: all-blob-reports
          pattern: e2e-blob-report-*
          merge-multiple: true

      # Downloads the raw Allure results from every concurrent shard runner
      - name: Download all Allure results
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: allure-results
          pattern: allure-results-*
          merge-multiple: true

      # Merges the distributed Playwright blobs into a single readable HTML report
      - name: Merge Playwright Reports
        run: |
          if [ -d "all-blob-reports" ] && [ "$(ls -A all-blob-reports 2>/dev/null)" ]; then
            npx playwright merge-reports --reporter html ./all-blob-reports
          else
            echo "No blob reports found. Skipping merge."
          fi

      # Uploads the finalized, unified Playwright HTML report
      - name: Upload Merged Playwright HTML
        uses: actions/upload-artifact@v7
        with:
          name: playwright-merged-html-report
          path: playwright-report

      # Downloads coverage data from all test jobs and merges into .nyc_output
      - name: Download all coverage data
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: ${{ env.NYC_OUTPUT_DIR }}
          pattern: nyc-output-*
          merge-multiple: true

      # Generates unified lcov report from merged coverage data
      - name: Generate merged code coverage
        run: |
          mkdir -p ${{ env.NYC_OUTPUT_DIR }}
          if [ "$(ls -A ${{ env.NYC_OUTPUT_DIR }})" ]; then
            npx nyc report --temp-dir=${{ env.NYC_OUTPUT_DIR }} --reporter=lcovonly
          else
            echo "No coverage data found in ${{ env.NYC_OUTPUT_DIR }}. Creating empty lcov.info."
            mkdir -p coverage
            touch coverage/lcov.info
          fi

      # Fails the pipeline if code coverage drops below 80%
      - name: Enforce 80% Code Coverage Gate
        continue-on-error: true
        run: |
          if [ -f "coverage/lcov.info" ] && [ -s "coverage/lcov.info" ]; then
            npm run coverage:check
          else
            echo "Skipping coverage check: lcov.info is missing or empty."
          fi

      - name: Upload merged coverage (for Sonar)
        uses: actions/upload-artifact@v7
        with:
          name: merged-lcov
          path: coverage/lcov.info
          retention-days: 1

      # Publishes the merged test coverage to Coveralls dashboard
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@master
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Checks out the gh-pages branch to access historical Allure test data
      - name: Load test report history
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      # Consolidates new and historical results into a new interactive Allure build report
      - name: Build Allure report
        uses: simple-elf/allure-report-action@v1.13
        with:
          gh_pages: gh-pages
          allure_history: allure-history
          allure_results: allure-results

      - name: Copy summary.json for Badges
        run: |
          sudo mkdir -p allure-history/widgets
          sudo cp allure-history/${{ github.run_number }}/widgets/summary.json allure-history/widgets/summary.json

      # Commits the new Allure trend graphs and test statuses directly to GitHub Pages
      - name: Publish test report to GH Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true
