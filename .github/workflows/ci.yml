name: CI
on:
  push:
    branches: [main, gh-pages]
  pull_request:
    branches: [main, gh-pages]
  schedule:
    - cron: "0 0 * * *"
permissions:
  contents: write
  pages: write
  id-token: write

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ==========================================
  # 1. STATIC ANALYSIS
  # ==========================================
  static-code-analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: MegaLinter
        uses: oxsecurity/megalinter@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # 2. SETUP & CACHE (Runs once to save time)
  # ==========================================
  setup:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install

  # ==========================================
  # 3a. NON-SHARDED TESTS (API, BDD, Visual, etc.)
  # ==========================================
  tests-misc:
    name: API, BDD, Visual, Cross-Browser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Start app service (Docker Compose)
        run: docker compose up -d --build app api mongo

      - name: Health Checks for service
        run: |
          wait_for() {
            local url=$1
            for i in {1..30}; do
              if curl -sSf "$url" > /dev/null 2>&1; then
                echo "✓ $url is ready"
                return 0
              fi
              sleep 1
            done
            echo "✗ $url failed to start"
            return 1
          }
          wait_for http://127.0.0.1:5001/api/colors &
          PID_API=$!
          wait_for http://127.0.0.1:3000 &
          PID_APP=$!
          wait_for http://127.0.0.1:3000/api/colors &
          PID_PROXY=$!
          wait $PID_API $PID_APP $PID_PROXY

      - name: Run API tests
        id: api-tests
        continue-on-error: true
        run: docker compose run --rm playwright npm run test:api

      - name: Run BDD tests
        id: bdd-tests
        continue-on-error: true
        run: docker compose run --rm playwright npm run test:bdd

      - name: Run cross-browser compatibility tests
        id: cross-browser-tests
        continue-on-error: true
        run: docker compose run --rm playwright npm run test:cross-browser

      - name: Generate code coverage
        run: docker compose run --rm playwright npx nyc report --reporter=lcovonly

      - name: Run Playwright in Docker Compose for visual regression
        id: visual-tests
        continue-on-error: true
        run: |
          mkdir -p e2e/snapshots test-results allure-results
          docker compose run --rm playwright e2e/tests/visual.spec.ts

      - name: Upload Misc Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: misc-test-artifacts
          path: |
            test-results/**
            e2e/snapshots/**
            coverage/**
            allure-results/**

      - name: Fail pipeline if misc tests failed
        if: steps.api-tests.outcome == 'failure' || steps.bdd-tests.outcome == 'failure' || steps.cross-browser-tests.outcome == 'failure' || steps.visual-tests.outcome == 'failure'
        run: exit 1

  # ==========================================
  # 3b. SHARDED E2E TESTS (Parallel Execution)
  # ==========================================
  e2e-sharded:
    name: E2E Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      # Exactly identical working Docker environment for the shards
      - name: Start app service (Docker Compose)
        run: docker compose up -d --build app api mongo

      - name: Health Checks for service
        run: |
          wait_for() {
            local url=$1
            for i in {1..30}; do
              if curl -sSf "$url" > /dev/null 2>&1; then
                echo "✓ $url is ready"
                return 0
              fi
              sleep 1
            done
            return 1
          }
          wait_for http://127.0.0.1:5001/api/colors &
          PID_API=$!
          wait_for http://127.0.0.1:3000 &
          PID_APP=$!
          wait_for http://127.0.0.1:3000/api/colors &
          PID_PROXY=$!
          wait $PID_API $PID_APP $PID_PROXY

      - name: Run sharded e2e tests
        run: docker compose run --rm playwright npx playwright test '^(?!.*visual\.spec\.ts).*\.spec\.ts$' --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --reporter=blob,allure-playwright

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1

      - name: Upload Allure Results for Shard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shardIndex }}
          path: allure-results/**
          retention-days: 1

  # ==========================================
  # 4. REPORTING & PUBLISHING (The Fan-In)
  # ==========================================
  publish-reports:
    name: Merge Reports & Publish
    needs: [tests-misc, e2e-sharded]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm ci --legacy-peer-deps

      # Download all artifacts across all jobs
      - name: Download Misc Artifacts
        uses: actions/download-artifact@v4
        with:
          name: misc-test-artifacts

      - name: Download all Playwright blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: e2e-blob-report-*
          merge-multiple: true

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          pattern: allure-results-shard-*
          merge-multiple: true

      - name: Merge Playwright Reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload Merged Playwright HTML
        uses: actions/upload-artifact@v4
        with:
          name: playwright-merged-html-report
          path: playwright-report

      - name: Upload host-run coverage to Coveralls
        uses: coverallsapp/github-action@master
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load test report history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report
        uses: simple-elf/allure-report-action@v1.13
        with:
          gh_pages: gh-pages
          allure_history: allure-history
          allure_results: allure-results

      - name: Publish test report to GH Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true
