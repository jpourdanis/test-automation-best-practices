# BrowserStack SDK configuration
# Credentials are read from BROWSERSTACK_USERNAME and BROWSERSTACK_ACCESS_KEY env vars.
# Set them as GitHub Actions secrets — never commit real values here.
userName: ${BROWSERSTACK_USERNAME}
accessKey: ${BROWSERSTACK_ACCESS_KEY}

# ── Project metadata ──────────────────────────────────────────────────────────
projectName: Test Automation Best Practices
buildName: Production E2E (BrowserStack)
buildIdentifier: "#${GITHUB_RUN_NUMBER}"

# ── Desktop browsers ──────────────────────────────────────────────────────────
browsers:
  - browser: chrome
    os: Windows
    osVersion: 11
    browserVersion: latest

  - browser: firefox
    os: Windows
    osVersion: 11
    browserVersion: latest

  - browser: playwright-webkit
    os: OS X
    osVersion: Ventura
    browserVersion: latest

# ── Real mobile devices ───────────────────────────────────────────────────────
# Playwright project names (bs-pixel-7, bs-iphone-15) are mapped here by the SDK.
devices:
  - deviceName: Samsung Galaxy S23
    osVersion: 13.0
    browserName: chrome

  - deviceName: iPhone 15
    osVersion: 17
    browserName: safari

# ── Parallelism ───────────────────────────────────────────────────────────────
# 2 parallel sessions per platform keeps costs manageable; raise for faster runs.
parallelsPerPlatform: 2

# ── Debugging ─────────────────────────────────────────────────────────────────
debug: false
networkLogs: true
consoleLogs: warn
video: true
